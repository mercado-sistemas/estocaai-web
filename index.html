<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estocaaí — Sistema de Estoque</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,400..900&display=swap" rel="stylesheet">
<style>
:root{
  --azul:#14213D; --azul-2:#1E2F55; --azul-3:#2A3E6B;
  --amarelo:#FFD60A; --amarelo-2:#E6BE00; --amarelo-bg:#FFF6D1;
  --fundo:#EDEFF3; --janela:#FFFFFF; --tinta:#16181D; --cinza:#6B7280; --linha:#D8DCE3;
  --verde:#1E7A52; --vermelho:#B3362B; --vermelho-bg:#FBEAE8; --verde-bg:#E4F3EC;
  --sel:#DCE6FA;
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:'Archivo', system-ui, sans-serif; font-size:14px; color:var(--tinta);
  background:var(--azul);
  background-image:
    radial-gradient(circle at 80% 10%, rgba(255,214,10,.12), transparent 45%),
    repeating-linear-gradient(-45deg, transparent 0 26px, rgba(255,255,255,.03) 26px 27px);
  display:flex; flex-direction:column; min-height:100dvh; overflow:hidden;
}
button{font-family:inherit; cursor:pointer}
input,select{font-family:inherit; font-size:14px}
.hide{display:none !important}
kbd{font-family:inherit; font-weight:800; font-size:11px; color:var(--cinza)}

.titulo-sis{
  background:var(--azul-2); color:#fff; text-align:center; font-weight:900; letter-spacing:.14em;
  font-size:13px; padding:7px 0; text-transform:uppercase; user-select:none;
  border-bottom:2px solid var(--amarelo);
}
.titulo-sis span{color:var(--amarelo)}

.menubar{
  background:#fff; border-bottom:1px solid var(--linha); display:flex; padding:0 6px;
  position:relative; z-index:80; user-select:none; flex-wrap:wrap;
}
.menu-raiz{position:relative}
.menu-raiz > button{background:none; border:none; padding:8px 12px; font-size:13.5px; font-weight:600}
.menu-raiz > button:hover,.menu-raiz.aberto > button{background:var(--amarelo-bg)}
.menu-raiz > button u{text-decoration:underline; text-underline-offset:2px}
.submenu{
  position:absolute; top:100%; left:0; min-width:280px; background:#fff;
  border:1px solid var(--linha); box-shadow:0 10px 30px rgba(20,33,61,.25); z-index:90; padding:4px 0;
}
.submenu .item{
  width:100%; text-align:left; background:none; border:none; padding:8px 14px; font-size:13.5px;
  display:flex; align-items:center; gap:8px; position:relative; white-space:nowrap;
}
.submenu .item:hover{background:var(--sel)}
.submenu .item .tecla{margin-left:auto; padding-left:24px}
.submenu .item .seta{margin-left:auto; padding-left:24px; color:var(--cinza); font-size:11px}
.submenu .divisor{height:1px; background:var(--linha); margin:4px 0}
.submenu .submenu{top:-5px; left:100%}

.toolbar{
  background:#fff; border-bottom:1px solid var(--linha); display:flex;
  overflow-x:auto; padding:6px 8px; gap:2px;
}
.ferramenta{
  border:none; background:none; border-radius:8px; padding:7px 11px; min-width:82px;
  flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:2px;
}
.ferramenta:hover{background:var(--amarelo-bg)}
.ferramenta .ico{font-size:19px; line-height:1}
.ferramenta .atalho{font-weight:900; font-size:12.5px; color:var(--azul)}
.ferramenta .rot{font-size:10.5px; color:var(--cinza); white-space:nowrap}

.mesa{
  flex:1; position:relative; overflow:auto; display:flex;
  align-items:flex-start; justify-content:center; padding:26px 12px 40px;
}
.marca-fundo{
  position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
  justify-content:center; color:rgba(255,255,255,.85); pointer-events:none;
  text-align:center; padding:20px;
}
.marca-fundo .logo{font-size:52px; font-weight:900; letter-spacing:-1px}
.marca-fundo .logo span{color:var(--amarelo)}
.marca-fundo .frase{opacity:.55; font-size:14px; margin-top:6px}
.marca-fundo .pistoes{font-size:44px; margin-bottom:10px; letter-spacing:8px}

.janela{
  position:relative; z-index:20; background:var(--janela); border:1px solid var(--azul-2);
  box-shadow:0 24px 70px rgba(0,0,0,.45); width:100%; max-width:980px; border-radius:8px;
  overflow:hidden; max-height:calc(100dvh - 210px); display:flex; flex-direction:column;
}
.janela-cab{
  background:var(--azul); color:#fff; display:flex; align-items:center;
  padding:0; user-select:none; flex-shrink:0;
}
.janela-cab .dobra{
  width:56px; align-self:stretch; background:var(--amarelo);
  clip-path:polygon(0 0, 100% 0, 55% 100%, 0 100%);
}
.janela-cab .tit{flex:1; text-align:center; font-weight:800; font-size:15px; padding:9px 6px}
.janela-cab .fechar{
  background:none; border:none; color:#fff; font-size:15px; font-weight:800;
  width:44px; align-self:stretch;
}
.janela-cab .fechar:hover{background:var(--vermelho)}
.janela-corpo{padding:14px; overflow:auto}

.tabela{width:100%; border-collapse:collapse; font-size:13px}
.tabela th{
  background:var(--azul-2); color:#fff; text-align:left; padding:7px 8px;
  font-size:11px; text-transform:uppercase; letter-spacing:.06em; position:sticky; top:0;
}
.tabela td{padding:7px 8px; border-bottom:1px solid var(--linha)}
.tabela tbody tr{cursor:pointer}
.tabela tbody tr:hover{background:var(--amarelo-bg)}
.tabela tbody tr.sel{background:var(--sel); outline:1.5px solid var(--azul-3); outline-offset:-1.5px}
.tabela .num{text-align:right; font-variant-numeric:tabular-nums}
.tabela .neg{color:var(--vermelho); font-weight:800}
.moldura-grid{border:1px solid var(--linha); border-radius:6px; overflow:auto; max-height:240px}

.painel-det{
  border:1px solid var(--linha); border-radius:6px; margin-top:12px; padding:12px;
  display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px 20px;
  font-size:13px; background:#FAFBFC;
}
.bloco-det .bloco-tit{
  font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.07em;
  color:var(--azul); border-bottom:2px solid var(--amarelo); display:inline-block;
  margin-bottom:7px; padding-bottom:2px;
}
.bloco-det .lin{display:flex; justify-content:space-between; gap:10px; padding:2.5px 0}
.bloco-det .lin span{color:var(--cinza)}
.bloco-det .lin b{font-variant-numeric:tabular-nums; text-align:right}

.grade-botoes{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:6px; margin-top:12px}
.btn-acao{
  border:1px solid var(--linha); background:#fff; border-radius:7px; padding:9px 8px;
  font-size:12.5px; font-weight:700; color:var(--tinta);
}
.btn-acao:hover{border-color:var(--amarelo-2); background:var(--amarelo-bg)}
.btn-acao.primario{background:var(--amarelo); border-color:var(--amarelo); color:var(--azul); font-weight:800}
.btn-acao.primario:hover{background:var(--amarelo-2)}
.btn-acao:disabled{opacity:.5; cursor:not-allowed}

.consulta{border-top:1px solid var(--linha); margin-top:12px; padding-top:10px; font-size:13px}
.consulta .radios{display:flex; flex-wrap:wrap; gap:4px 14px; margin-bottom:8px; align-items:center}
.consulta .radios b{color:var(--azul); font-size:12px; text-transform:uppercase; letter-spacing:.05em}
.consulta label{display:flex; align-items:center; gap:4px; font-size:12.5px; color:var(--cinza)}
.consulta input[type=radio],.consulta input[type=checkbox]{accent-color:var(--azul)}
.linha-consulta{display:flex; gap:8px}
.linha-consulta input[type=text]{
  flex:1; padding:9px 12px; border:1.5px solid var(--linha); border-radius:7px; background:var(--amarelo-bg);
}
.linha-consulta input[type=text]:focus{outline:2px solid var(--amarelo); border-color:var(--amarelo-2)}

.form-linha{display:grid; grid-template-columns:170px 1fr; gap:8px 12px; align-items:center; margin-bottom:9px}
.form-linha label{font-size:12.5px; font-weight:700; color:var(--azul); text-transform:uppercase; letter-spacing:.03em}
.form-linha input,.form-linha select{
  padding:9px 11px; border:1.5px solid var(--linha); border-radius:7px; background:#FAFBFC; width:100%;
}
.form-linha input:focus,.form-linha select:focus{outline:2px solid var(--amarelo); border-color:var(--amarelo-2)}
@media(max-width:600px){.form-linha{grid-template-columns:1fr; gap:3px}}
.rodape-form{display:flex; gap:8px; justify-content:flex-end; margin-top:14px}
.rodape-form .btn-acao{min-width:130px}

.inp{border:1.5px solid var(--linha); border-radius:7px; padding:7px 9px; font-size:13px; background:#FAFBFC; font-family:inherit; color:var(--tinta)}
.inp:focus{outline:2px solid var(--amarelo); border-color:var(--amarelo-2)}

/* ─── Precificaí ─── */
.pf-rail{display:flex; gap:14px; overflow-x:auto; padding:4px 2px 90px; scroll-snap-type:x mandatory}
.pf-rail::-webkit-scrollbar{height:8px}
.pf-rail::-webkit-scrollbar-thumb{background:var(--linha); border-radius:99px}
.pf-col{scroll-snap-align:start; flex:0 0 300px; background:#fff; border:2px solid var(--linha); border-radius:14px; padding:14px; position:relative}
.pf-col.melhor{border-color:var(--verde)}
.pf-badge{display:none; position:absolute; top:-11px; right:12px; background:var(--verde); color:#fff; font-size:10px; font-weight:700; letter-spacing:1px; padding:3px 8px; border-radius:99px}
.pf-col.melhor .pf-badge{display:block}
.pf-mini{border:1.5px solid var(--azul); background:transparent; border-radius:7px; font-size:12px; font-weight:700; padding:4px 7px; cursor:pointer; flex-shrink:0}
.pf-mini.red{color:var(--vermelho); border-color:var(--vermelho)}
.pf-ghost{border:2px dashed var(--azul); background:transparent; font-weight:700; border-radius:8px; padding:7px 10px; cursor:pointer; font-size:12px; width:100%}
.pf-taxrow{display:flex; align-items:center; gap:6px; padding:5px 8px; border-radius:8px; background:var(--fundo); border:1.5px solid var(--azul); margin-bottom:5px}
.pf-taxrow.destaque{background:var(--amarelo-bg)}
.pf-taxrow .nome{flex:1; font-size:12px; font-weight:700; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.pf-modo{display:flex; gap:6px; margin:8px 0}
.pf-modo button{flex:1; padding:7px 4px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:700; border:2px solid var(--azul); background:transparent}
.pf-modo button.on{background:var(--azul); color:#fff}
.pf-chip{padding:3px 8px; border-radius:99px; font-size:10px; font-weight:700; cursor:pointer; border:1.5px solid var(--azul); background:transparent}
.pf-chip.on{background:var(--amarelo)}
.pf-etiqueta{background:var(--amarelo); border-radius:10px; padding:8px 12px; text-align:center; transform:rotate(-2deg); box-shadow:2px 3px 0 rgba(20,33,61,.22); flex-shrink:0}
.pf-etiqueta .t{font-size:8px; font-weight:700; letter-spacing:1px}
.pf-etiqueta .p{font-weight:900; line-height:1}
.pf-legenda{margin-top:8px}
.pf-legenda div{display:flex; align-items:center; gap:6px; font-size:11px}
.pf-legenda span.sw{width:9px; height:9px; border-radius:2px; flex-shrink:0}
.pf-legenda span.nm{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.pf-lucrobox{margin-top:10px; padding:8px 10px; border-radius:8px; font-size:12px}
.pf-lucrobox.ok{background:var(--verde-bg); border:1.5px solid var(--verde)}
.pf-lucrobox.ruim{background:var(--vermelho-bg); border:1.5px solid var(--vermelho)}
.pf-savebar{position:sticky; bottom:-14px; left:-14px; right:-14px; margin:14px -14px -14px; background:#fff; border-top:2px solid var(--azul); padding:10px 14px}
.pf-savebar .in{display:flex; gap:10px; align-items:center}
.pf-savebar select{flex:1; min-width:0; padding:11px 10px; font-weight:700; font-size:14px}
.pf-savebar .btn{border:none; border-radius:10px; padding:12px 18px; font-size:14px; font-weight:700; flex-shrink:0; background:#C9C7BF; color:#fff; cursor:not-allowed}
.pf-savebar .btn.on{background:var(--verde); cursor:pointer}
.pf-overlay{position:fixed; inset:0; background:rgba(20,33,61,.5); z-index:400; display:flex; align-items:flex-end; justify-content:center}
.pf-overlay.center{align-items:center; padding:16px}
.pf-sheet{background:#fff; border-radius:16px 16px 0 0; width:100%; max-width:560px; max-height:82vh; display:flex; flex-direction:column; padding:16px}
.pf-modal{background:#fff; border-radius:16px; padding:20px; width:100%; max-width:400px; border:2px solid var(--azul)}
.pf-tabs{display:flex; gap:6px; margin-bottom:10px}
.pf-tabs button{flex:1; padding:8px 4px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:700; border:2px solid var(--azul); background:transparent}
.pf-tabs button.on{background:var(--azul); color:#fff}
.pf-pickrow{display:flex; width:100%; align-items:center; gap:10px; padding:10px 8px; border:none; border-bottom:1px solid #EEE; background:transparent; cursor:pointer; text-align:left}
.pf-tag{font-size:9px; font-weight:700; margin-left:6px; padding:2px 6px; border-radius:99px}
.pf-tag.compra{background:#E3ECF7} .pf-tag.venda{background:#FDE8D7}
.pf-drop{position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:20; background:#fff; border:2px solid var(--azul); border-radius:10px; overflow:hidden; box-shadow:0 8px 24px rgba(20,33,61,.18); max-height:280px; overflow-y:auto}
.pf-droprow{display:flex; width:100%; align-items:center; gap:10px; padding:10px 14px; border:none; background:#fff; cursor:pointer; text-align:left; border-bottom:1px solid #EEE}

.statusbar{
  background:#fff; border-top:2px solid var(--amarelo); padding:6px 12px; font-size:11.5px;
  color:var(--cinza); display:flex; gap:6px; flex-wrap:wrap; align-items:center; user-select:none;
}
.statusbar b{color:var(--azul)}
.statusbar .logo-st{font-weight:900; font-size:14px; color:var(--azul); margin-right:8px}
.statusbar .logo-st span{color:var(--amarelo-2)}
.statusbar .dir{margin-left:auto; text-align:right}

.veu-login{
  position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center;
  background:var(--azul);
  background-image:radial-gradient(circle at 80% 15%, rgba(255,214,10,.15), transparent 45%);
  padding:20px;
}
.janela-login{background:#fff; border-radius:10px; width:100%; max-width:420px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,.5)}
.janela-login .corpo-login{padding:22px; display:flex; gap:18px; align-items:center}
.logo-login{font-size:44px; font-weight:900; color:var(--azul); line-height:.9; flex-shrink:0; border-right:3px solid var(--amarelo); padding-right:16px}
.logo-login span{color:var(--amarelo-2)}
.campos-login{flex:1}
.campos-login .form-linha{grid-template-columns:80px 1fr}
.rodape-login{display:flex; gap:8px; justify-content:flex-end; padding:0 22px 20px}
.aba-login{flex:1; padding:11px 0; border:none; background:var(--amarelo-bg); cursor:pointer; font-size:13.5px; font-weight:600; color:var(--cinza); transition:none}
.aba-login.aba-ativa{background:var(--azul); color:#fff; font-weight:800}

#toast{
  position:fixed; left:50%; bottom:56px; transform:translateX(-50%) translateY(16px);
  background:var(--azul); color:#fff; padding:11px 18px; border-radius:9px;
  font-weight:700; font-size:13.5px; opacity:0; pointer-events:none;
  transition:all .22s ease; z-index:300; box-shadow:0 10px 34px rgba(0,0,0,.4);
  max-width:calc(100vw - 30px); text-align:center; border-left:4px solid var(--amarelo);
}
#toast.mostra{opacity:1; transform:translateX(-50%) translateY(0)}
@media(prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>

<div class="veu-login" id="veu-login">
  <div class="janela-login">
    <div class="janela-cab"><div class="dobra"></div><div class="tit">ESTOCAAÍ — SISTEMA DE ESTOQUE</div></div>

    <!-- Abas: Funcionário / Gestor -->
    <div style="display:flex; border-bottom:1px solid var(--linha);">
      <button id="aba-func" class="aba-login aba-ativa" type="button" onclick="trocarAba('func')">Funcionário</button>
      <button id="aba-chefe" class="aba-login" type="button" onclick="trocarAba('chefe')">Gestor / Dono</button>
    </div>

    <div class="corpo-login">
      <div class="logo-login">E<span>aí</span></div>
      <div class="campos-login">
        <div id="campo-usr" class="form-linha">
          <label for="lg-usr">Usuário</label>
          <input id="lg-usr" autocomplete="username" placeholder="nome de usuário">
        </div>
        <div id="campo-email" class="form-linha hide">
          <label for="lg-email">E-mail</label>
          <input id="lg-email" type="email" autocomplete="email" placeholder="seu e-mail de cadastro">
        </div>
        <div class="form-linha"><label for="lg-sen">Senha</label>
          <input id="lg-sen" type="password" autocomplete="current-password" placeholder="••••••">
        </div>
      </div>
    </div>
    <div class="rodape-login">
      <button id="btn-cadastro" class="btn-acao hide" type="button" onclick="abrirCadastroGestor()">Criar conta</button>
      <button class="btn-acao primario" id="btn-entrar" style="min-width:110px" onclick="entrar()"><u>O</u>k</button>
    </div>
  </div>
</div>

<!-- Filial picker (shown after login when user has multiple lojas) -->
<div class="veu-login hide" id="veu-filial">
  <div class="janela-login">
    <div class="janela-cab"><div class="dobra"></div><div class="tit">SELECIONAR FILIAL</div></div>
    <div class="corpo-login" style="flex-direction:column; padding:22px; gap:12px;">
      <p style="font-size:13.5px; color:var(--cinza);">Escolha a filial que deseja acessar:</p>
      <div id="lista-filiais-picker" style="display:flex; flex-direction:column; gap:8px;"></div>
    </div>
  </div>
</div>

<!-- Cadastro Gestor inline overlay -->
<div class="veu-login hide" id="veu-cadastro" style="z-index:300;">
  <div class="janela-login">
    <div class="janela-cab"><div class="dobra"></div><div class="tit">CRIAR CONTA — GESTOR / DONO</div></div>
    <div style="padding:22px;">
      <div class="form-linha"><label>Nome *</label><input id="cad-nome" placeholder="Seu nome completo"></div>
      <div class="form-linha"><label>E-mail *</label><input id="cad-email" type="email" placeholder="email@empresa.com"></div>
      <div class="form-linha"><label>Senha *</label><input id="cad-sen" type="password" placeholder="mínimo 6 caracteres"></div>
      <div class="form-linha"><label>Confirmar senha *</label><input id="cad-sen-conf" type="password" placeholder="repita a senha"></div>
      <div class="form-linha"><label>Telefone *</label><input id="cad-tel" type="tel" placeholder="(00) 00000-0000"></div>
      <div style="border-top:1px solid var(--linha);margin:10px 0 8px;padding-top:8px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--azul)">Endereço</div>
      <div class="form-linha">
        <label>CEP *</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="cad-cep" placeholder="00000-000" maxlength="9" style="width:140px" oninput="buscarCepCadastro(this.value)">
          <span id="cad-cep-st" style="font-size:12px;color:var(--cinza)"></span>
        </div>
      </div>
      <div class="form-linha"><label>Rua *</label><input id="cad-rua" placeholder="Preenchido pelo CEP"></div>
      <div class="form-linha"><label>Número *</label><input id="cad-num" style="width:100px"></div>
      <div class="form-linha"><label>Complemento</label><input id="cad-comp" placeholder="Apto, sala…"></div>
      <div class="form-linha"><label>Bairro *</label><input id="cad-bairro"></div>
      <div class="form-linha"><label>Cidade *</label><input id="cad-cidade"></div>
      <div class="form-linha"><label>Estado (UF) *</label><input id="cad-uf" maxlength="2" style="width:60px" placeholder="SP"></div>
      <div class="rodape-form">
        <button class="btn-acao" onclick="fecharCadastro()">Cancelar</button>
        <button class="btn-acao primario" onclick="registrarGestor()">Criar conta</button>
      </div>
    </div>
  </div>
</div>

<div class="titulo-sis">ESTOCA<span>AÍ</span> — SISTEMA DE ESTOQUE</div>
<nav class="menubar" id="menubar"></nav>
<div class="toolbar" id="toolbar"></div>

<div class="mesa" id="mesa">
  <div class="marca-fundo">
    <div class="pistoes">⦁ ⦁ ⦁</div>
    <div class="logo">Estoca<span>aí</span></div>
    <div class="frase">Controle de estoque multi-lojas — para qualquer segmento</div>
  </div>
</div>

<footer class="statusbar">
  <span class="logo-st">E<span>aí</span></span>
  <span>Usuário: <b id="st-usuario">—</b></span> |
  <span>Servidor: <b>nuvem</b></span> |
  <span>Filial: <b id="st-filial">—</b></span> |
  <span>Versão: <b>1.0</b></span>
  <span class="dir" id="st-relogio"></span>
